name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: mcp/move-lsp-mcp/package.json

      - name: Install dependencies
        working-directory: mcp/move-lsp-mcp
        run: pnpm install

      - name: Build MCP server
        working-directory: mcp/move-lsp-mcp
        run: pnpm build

      - name: Verify committed bundle matches source
        # Only diff the runtime bundle — sourcemap `sources` paths leak the
        # local pnpm store layout and differ across environments, so they're
        # not a stable reproducibility signal.
        run: |
          if ! git diff --exit-code mcp/move-lsp-mcp/dist/index.js; then
            echo ""
            echo "::error::dist/index.js is out of sync with src/. Run 'pnpm --dir mcp/move-lsp-mcp build' and recommit."
            exit 1
          fi

      - name: Enforce MCP bundle size budget
        # ~600 KB ceiling on the minified ESM bundle. Current size ~480 KB
        # (mostly ajv via @modelcontextprotocol/sdk). Bumping this ceiling
        # should be a deliberate choice, not a silent drift from dep growth.
        run: |
          BUDGET_BYTES=600000
          SIZE=$(wc -c < mcp/move-lsp-mcp/dist/index.js)
          echo "Bundle size: ${SIZE} bytes (budget: ${BUDGET_BYTES})"
          if [ "$SIZE" -gt "$BUDGET_BYTES" ]; then
            echo "::error::MCP bundle exceeds ${BUDGET_BYTES} bytes (current: ${SIZE}). Investigate dependency growth before raising the budget."
            exit 1
          fi

      - name: Run unit tests
        working-directory: mcp/move-lsp-mcp
        run: set -o pipefail; pnpm test -- --reporter=verbose 2>&1 | grep -E '(✓|✗|PASS|FAIL|test/unit)'

      - name: Verify plugin structure
        run: |
          echo "Checking plugin structure..."
          test -f .claude-plugin/plugin.json && echo "✓ plugin.json exists"
          test -f agents/sui-pilot-agent.md && echo "✓ agent exists"
          test -d skills && echo "✓ skills directory exists"
          test -f mcp/move-lsp-mcp/dist/index.js && echo "✓ MCP server built"
          test -f LICENSE && echo "✓ LICENSE exists"

      - name: Check documentation directories
        run: |
          echo "Checking documentation..."
          count_doc_files() { find "$1" -type f \( -name '*.mdx' -o -name '*.md' \) | wc -l; }
          test -d .sui-docs && echo "✓ .sui-docs exists ($(count_doc_files .sui-docs) doc files)"
          test -d .move-book-docs && echo "✓ .move-book-docs exists ($(count_doc_files .move-book-docs) doc files)"
          test -d .walrus-docs && echo "✓ .walrus-docs exists ($(count_doc_files .walrus-docs) doc files)"
          test -d .seal-docs && echo "✓ .seal-docs exists ($(count_doc_files .seal-docs) doc files)"
          test -d .ts-sdk-docs && echo "✓ .ts-sdk-docs exists ($(count_doc_files .ts-sdk-docs) doc files)"

      - name: Enforce slim-preamble budget
        # v2: agents/sui-pilot-agent.md is always-loaded into every session via
        # the global @-import. Keep it slim — anything over ~4 KB starts to
        # dominate the SessionStart cost. Mirror BUDGET in scripts/verify.sh.
        run: |
          AGENT_FILE=agents/sui-pilot-agent.md
          AGENT_BUDGET_BYTES=4000
          SIZE=$(wc -c < "$AGENT_FILE")
          echo "Agent preamble size: ${SIZE} bytes (budget: ${AGENT_BUDGET_BYTES})"
          if [ "$SIZE" -gt "$AGENT_BUDGET_BYTES" ]; then
            echo "::error::$AGENT_FILE exceeds ${AGENT_BUDGET_BYTES} bytes (current: ${SIZE}). Slim it or raise the cap deliberately."
            exit 1
          fi
          for needle in '.sui-docs' '.move-book-docs' '.walrus-docs' '.seal-docs' '.ts-sdk-docs'; do
            if ! grep -qF "$needle" "$AGENT_FILE"; then
              echo "::error::$AGENT_FILE missing routing entry: $needle"
              exit 1
            fi
          done
          echo "✓ $AGENT_FILE within budget and routes all five corpora"

      - name: Smoke test move-pr-review scripts
        run: bash skills/move-pr-review/scripts/tests/smoke.sh

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: mcp/move-lsp-mcp/package.json

      - name: Install dependencies
        working-directory: mcp/move-lsp-mcp
        run: pnpm install

      - name: Type check
        working-directory: mcp/move-lsp-mcp
        run: pnpm exec tsc --noEmit
