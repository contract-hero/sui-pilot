name: Refresh upstream docs

on:
  schedule:
    # Mondays 06:00 UTC — weekly cadence is roughly what the team
    # previously did manually per the README ("monthly, or before a major project").
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-docs
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Pull upstream docs
        run: ./sync-docs.sh

      - name: Skip bundler if nothing drifted
        id: drift
        # sync-sui-pilot-docs.sh always rewrites docs/VERSION.json with a fresh
        # syncTimestamp, so if we ran it unconditionally every week would
        # produce a timestamp-only PR. Gate it on real changes to tracked docs.
        # git status (not git diff) so upstream-added files (untracked) count as drift.
        run: |
          if [ -z "$(git status --porcelain --untracked-files=all -- \
              .sui-docs .move-book-docs .walrus-docs .seal-docs .ts-sdk-docs)" ]; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
            echo "No upstream doc changes this run."
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh bundled docs snapshot
        if: steps.drift.outputs.drifted == 'true'
        run: ./scripts/sync-sui-pilot-docs.sh "$GITHUB_WORKSPACE"

      - name: Open or update chore PR
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          branch: chore/refresh-docs
          delete-branch: true
          commit-message: "chore(docs): refresh upstream docs"
          title: "chore(docs): refresh upstream docs"
          labels: docs
          body: |
            Automated weekly refresh of bundled upstream docs.

            Pipeline:
            1. `./sync-docs.sh` — pulls latest from `MystenLabs/sui`, `MystenLabs/move-book`, `MystenLabs/walrus`, `MystenLabs/seal`, `MystenLabs/ts-sdks`.
            2. `./scripts/sync-sui-pilot-docs.sh` — refreshes the `docs/` bundle and `docs/VERSION.json`.

            Review the diff, especially `docs/VERSION.json` and any newly added or renamed MDX files under `.*-docs/`. The agent preamble at `agents/sui-pilot-agent.md` no longer contains a generated index — it's hand-curated routing only.
