name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - EVAL_FRAMEWORK.html
      - SUI_PILOT_TOUR.html
      - POINT_VS_INDEX.html
      - sui-pilot.jpg
      - site/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -R site/. _site/
          cp sui-pilot.jpg _site/sui-pilot.jpg
          cp EVAL_FRAMEWORK.html _site/EVAL_FRAMEWORK.html
          cp SUI_PILOT_TOUR.html _site/SUI_PILOT_TOUR.html
          cp POINT_VS_INDEX.html _site/POINT_VS_INDEX.html
          ls -la _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
